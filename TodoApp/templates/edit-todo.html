{% include "layout.html" %}

<div class="container">
    <div class="card">
        <div class="card-header">
            Lets edit your todo!
        </div>
        <div class="card-body">
            <form id="editTodoForm">
                <div class="form-group">
                    <label for="">Title</label>
                    <input type="text" class="form-control" name="title" value="{{todo.title}}" required>
                </div>
                <div class="form-group">
                    <label for="">Description</label>
                    <textarea class="form-control" rows="3" name="description" required>{{todo.description}}</textarea>
                    </label>
                </div>
                <div class="form-group">
                    <label for="">Priority</label>
                    <select class="form-control" name="priority">
                        <option {% if todo.priority == 1 %}selected{% endif %}>1</option>
                        <option {% if todo.priority == 2 %}selected{% endif %}>2</option>
                        <option {% if todo.priority == 3 %}selected{% endif %}>3</option>
                        <option {% if todo.priority == 4 %}selected{% endif %}>4</option>
                        <option {% if todo.priority == 5 %}selected{% endif %}>5</option>
                    </select>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" name="completed" id="completed" {% if todo.completed %}checked{% endif %}>
                    <label class="form-check-label" for="completed">Completed</label>
                </div>
                <button class="btn btn-primary" type="submit">Edit Todo</button>
                <button id="deleteButton" type="button" class="btn btn-danger">Delete Todo</button>
                <a href="/todos/todo-page" class="btn btn-success">View Todos</a>
            </form>
        </div>
    </div>
</div>
